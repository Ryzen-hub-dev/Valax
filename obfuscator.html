<!DOCTYPE html>

<head>

<title>Valax Lua Protector - Enterprise Code Protection</title>
<style>
:root{
  --bg:#0a0b0f;--card:#12141c;--panel:#0e1017;--border:#1a1d28;
  --accent:#8b5cf6;--accent2:#06b6d4;--g:#22d3ee;--danger:#ef4444;
  --amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;--success:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(139,92,246,.08),transparent)}
.wrap{max-width:1440px;margin:0 auto;padding:1.5rem}
header{display:flex;align-items:center;gap:.8rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.logo{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.vbadge{font-size:.7rem;padding:.3rem .8rem;border-radius:12px;font-weight:700;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff}
.badge{font-size:.6rem;padding:.2rem .5rem;border-radius:4px;font-family:monospace}
.b1{background:rgba(34,211,238,.1);color:var(--g);border:1px solid rgba(34,211,238,.2)}
.b2{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.b3{background:rgba(139,92,246,.1);color:var(--accent);border:1px solid rgba(139,92,246,.2)}
.b4{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.main{display:grid;grid-template-columns:1fr 420px;gap:1.5rem;align-items:start}
@media(max-width:1100px){.main{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.5rem}
.ph{padding:.85rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase}
.dot{width:7px;height:7px;border-radius:50%}
.pb{padding:1.4rem}
textarea{width:100%;background:#080910;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:.78rem;padding:.9rem;resize:vertical;outline:none;line-height:1.6}
textarea:focus{border-color:var(--accent)}
.src{min-height:220px}.out{min-height:350px;background:#080910;color:var(--g)}
.slb{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.8rem 0 .45rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.ft{display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;background:var(--panel);border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none;transition:border .2s}
.ft:hover{border-color:var(--accent)}.ft.full{grid-column:1/-1}
.ft input{display:none}
.ft input:checked+.tb{background:var(--accent);border-color:var(--accent)}

.tb{width:30px;height:17px;background:var(--border);border:1px solid var(--muted);border-radius:9px;position:relative;transition:all .2s;flex-shrink:0}
.tb::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:#fff;border-radius:50%;transition:transform .2s}
.tl{font-size:.73rem;font-weight:600;line-height:1.2}.ts{font-size:.62rem;color:var(--muted);margin-top:.1rem}
.presets{display:flex;gap:.5rem;margin-bottom:1rem}
.pr{font-size:.72rem;padding:.45rem 1rem;border-radius:6px;cursor:pointer;font-weight:700;border:1px solid var(--border);background:var(--panel);color:var(--muted);transition:all .2s}
.pr:hover{border-color:var(--accent);color:var(--accent)}

.fi{margin-bottom:.8rem}
.fi label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}

.rb{width:100%;background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff;padding:.95rem;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 24px rgba(139,92,246,.3);transition:all .25s;margin-top:.25rem}

.rb:disabled{opacity:.5;cursor:not-allowed;transform:none}

.stat{text-align:center;flex:1}.sv{font-family:monospace;font-size:.95rem;font-weight:800;color:var(--accent)}
.sl2{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.info{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:.85rem;font-size:.76rem;color:var(--muted);line-height:1.7;margin-top:.7rem}

.progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.75rem;display:none}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
//  VALAX LUA PROTECTOR v7 — ENTERPRISE GRADE
//  Architecture: Modular AST-based obfuscation pipeline
// ═══════════════════════════════════════════════════════════════════════════

// ── Module 1: UTILITIES ────────────────────────────────────────────────────
const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const rh = (n = 8) => [...Array(n)].map(() => '0123456789abcdef'[ri(0, 15)]).join('');
const f  = id => document.getElementById('f_' + id)?.checked ?? false;

function setProg(v) {
  const e = document.getElementById('prog');
  e.style.display = 'block';
  document.getElementById('pf').style.width = v + '%';
  if (v >= 100) setTimeout(() => e.style.display = 'none', 500);
}

// ── Module 2: VARIABLE NAME GENERATOR ──────────────────────────────────────
// Enterprise-grade name generation: pool-based, Luraph-compatible
const _namePool = (() => {
  const chars = 'fDySJWxmwPMBXGaUsgnLEoRbKQHqiTkjhzVNuCvrted';
  const two   = ['nN','aN','cN','_N','_7','C7','y7','eN','f7','m7','H7','n7','AN','Z7','ON',
    'LN','mN','bN','rN','u7','MN','E7','iN','tN','N7','B7','v7','s7','k7','O7','P7','R7','S7',
    'q7','X7','h7','L7','jN','SN','BN','cC','gC','IC','rC','eC','WC','mC','PC','YC','GC'];
  const pool = [];
  for (const c of chars) pool.push(c);
  for (const t of two) pool.push(t);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool;
})();
let _nameIdx = 0;
const _usedNames = new Set();

function rname() {
  while (_nameIdx < _namePool.length) {
    const c = _namePool[_nameIdx++];
    if (!_usedNames.has(c)) { _usedNames.add(c); return c; }
  }
  const bases = 'fDySJWxmwPMBGaUnLeRb';
  for (let n = 10; n < 100; n++) {
    for (const b of bases) {
      const c = b + n;
      if (!_usedNames.has(c)) { _usedNames.add(c); return c; }
    }
  }
  return 'x' + Date.now();
}

// ── Module 3: NUMBER ENCODING ───────────────────────────────────────────────
let _numStyle = ri(0, 4);

function N(n) {
  n = Math.floor(n) & 0xFFFFFF;
  const s = _numStyle;
  if (s === 0) {
    // Luraph signature: binary/hex with underscores
    const mode = ri(0, 5);
    if (mode === 0) return '0B' + n.toString(2);
    if (mode === 1) return '0X' + n.toString(16).toUpperCase();
    if (mode === 2) { const b = n.toString(2); return '0B' + b.split('').map((d,i) => i>0&&i%4===0?'_'+d:d).join(''); }
    if (mode === 3) { const h = n.toString(16).toUpperCase(); return '0X' + h.split('').map((d,i) => i>0&&ri(0,2)===0?'_'+d:d).join(''); }
    const b = n.toString(2);
    return '0B' + b.split('').map((d,i) => i>0&&i%4===0?'__'+d:d).join('');
  }
  if (s === 1) {
    if (n === 0) return '(0.0)';
    if (n === 1) return '(1.0)';
    return `(${n}.0)`;
  }
  if (s === 2) {
    const k1 = ri(1, 0xFF);
    return `bit32.bxor(0x${(n ^ k1).toString(16).toUpperCase()},0x${k1.toString(16).toUpperCase()})`;
  }
  if (s === 3) {
    const off = ri(100, 999);
    return `(-${off}+${n+off})`;
  }
  const allFams = [0,1,2,3];
  const saved = _numStyle;
  _numStyle = allFams[ri(0,3)];
  const r = N(n);
  _numStyle = saved;
  return r;
}

// Deep wraparound: XOR-based number transformation
function dW(n) {
  n = Math.floor(n) & 0xFFFFFF;
  const offset = ri(0x10000000, 0x3FFFFFFF);
  const big = (n + offset) >>> 0;
  const rot = ri(2, 14);
  const rotBig = ((big >>> rot) | ((big << (32-rot)) >>> 0)) >>> 0;
  return `(-${offset}+bit32.rrotate(bit32.bor(${N(rotBig)},${N(0)}),${N(32-rot)}))`;
}

// ── Module 4: STRING ENCRYPTION ───────────────────────────────────────────
let _strSalt = ri(0, 5);
let _strVariant = ri(0, 3);

function encStr(s) {
  const v = _strVariant;
  if (v === 0) {
    let r = '"';
    for (const c of s) {
      const code = c.charCodeAt(0);
      const mode = (ri(0,2) + _strSalt) % 3;
      if (mode === 0) r += '\\x' + code.toString(16).padStart(2,'0').toUpperCase();
      else if (mode === 1) r += '\\u{' + code.toString(16).toUpperCase() + '}';
      else r += '\\' + code.toString(8).padStart(3,'0');
    }
    return r + '"';
  }
  if (v === 1) {
    const codes = [...s].map(c => c.charCodeAt(0)).join(',');
    return `string.char(${codes})`;
  }
  if (v === 2) {
    const key = ri(1, 127);
    const bytes = [...s].map(c => (c.charCodeAt(0) ^ key));
    return `(function()local _t={${bytes.join(',')}};local _s="";for _i=1,#_t do _s=_s..string.char(bit32.bxor(_t[_i],${key}))end;return _s end)()`;
  }
  const shift = ri(1, 7);
  const codes = [...s].reverse().map(c => c.charCodeAt(0) + shift);
  return `(function()local _t={${codes.join(',')}};local _s="";for _i=#_t,1,-1 do _s=_s..string.char(_t[_i]-${shift})end;return _s end)()`;
}

// ── Module 5: OPAQUE PREDICATES ────────────────────────────────────────────
const oT = () => ['math.floor(math.pi)~=4','math.huge>0','type(print)=="function"','math.abs(-1)==1','rawequal(1,1)','math.max(0,1)==1'][ri(0,5)];
const oF = () => ['math.floor(math.pi)==4','math.huge<0','type(print)=="number"','rawequal(1,2)','math.max(0,1)==0'][ri(0,4)];

// ── Module 6: ROBLOX API NOISE ─────────────────────────────────────────────
const RBLX_NOISE = ['workspace','game','script','Vector3','CFrame','Color3','UDim2','Instance',
  'task','math','string','table','pairs','ipairs','tostring','tonumber','Vector2','BrickColor',
  'TweenInfo','Enum','Random','coroutine','pcall','rawget','rawset','setmetatable','getmetatable',
  'select','unpack','tick','os','bit32','utf8','type','error','warn','print','next','assert'];
const rbxN = () => RBLX_NOISE[ri(0, RBLX_NOISE.length - 1)];

// ── Module 7: LEXER ────────────────────────────────────────────────────────
const KW = new Set(['and','break','do','else','elseif','end','false','for',
  'function','goto','if','in','local','nil','not','or','repeat','return',
  'then','true','until','while']);

function lex(src) {
  const ts = []; let i = 0; const n = src.length;
  function skipWS() { while (i < n && ' \t\r\n'.includes(src[i])) i++; }
  function readLong() {
    let lvl = 0; while (i < n && src[i] === '=') { lvl++; i++; }
    if (src[i] !== '[') return null; i++;
    const close = ']' + '='.repeat(lvl) + ']'; let s = '';
    while (i < n) { if (src.startsWith(close, i)) { i += close.length; return s; } s += src[i++]; }
    throw new Error('unfinished long_string');
  }
  while (i < n) {
    skipWS(); if (i >= n) break;
    if (src[i] === '[' && (src[i+1] === '[' || src[i+1] === '=')) {
      const si = i; i++;
      const lng = readLong();
      if (lng !== null) { ts.push({t:'S',v:lng}); continue; }
      i = si;
    }
    if (src[i] === '-' && src[i+1] === '-') {
      i += 2;
      if (src[i] === '[' && (src[i+1] === '[' || src[i+1] === '=')) {
        const si = i; i++;
        const lng = readLong();
        if (lng !== null) continue;
        i = si;
      }
      while (i < n && src[i] !== '\n') i++;
      continue;
    }
    if (src[i] === '"' || src[i] === "'") {
      const q = src[i++]; let s = '';
      while (i < n && src[i] !== q) {
        if (src[i] === '\\') {
          i++;
          const e = src[i++];
          const esc = {n:'\n',t:'\t',r:'\r','\\':'\\','"':'"',"'":"'",a:'\x07',b:'\b',f:'\f',v:'\v','0':'\0'};
          if (e >= '0' && e <= '9') {
            let d = e;
            if (i < n && src[i] >= '0' && src[i] <= '9') d += src[i++];
            if (i < n && src[i] >= '0' && src[i] <= '9') d += src[i++];
            s += String.fromCharCode(parseInt(d));
          } else if (e === 'x') { s += String.fromCharCode(parseInt(src.slice(i,i+2),16)); i+=2; }
          else s += esc[e] !== undefined ? esc[e] : e;
        } else s += src[i++];
      }
      i++; ts.push({t:'S',v:s}); continue;
    }
    if (/[0-9]/.test(src[i]) || (src[i] === '.' && /[0-9]/.test(src[i+1]))) {
      let s = '';
      if (src[i] === '0' && (src[i+1] === 'x' || src[i+1] === 'X')) {
        s = src.slice(i, i+2); i += 2;
        while (i < n && /[0-9a-fA-F_]/.test(src[i])) s += src[i++];
        ts.push({t:'N',v:parseInt(s.replace(/_/g,''))}); continue;
      }
      while (i < n && /[0-9]/.test(src[i])) s += src[i++];
      if (i < n && src[i] === '.') { s += src[i++]; while (i < n && /[0-9]/.test(src[i])) s += src[i++]; }
      if (i < n && (src[i] === 'e' || src[i] === 'E')) {
        s += src[i++];
        if (i < n && (src[i] === '+' || src[i] === '-')) s += src[i++];
        while (i < n && /[0-9]/.test(src[i])) s += src[i++];
      }
      ts.push({t:'N',v:parseFloat(s)}); continue;
    }
    if (/[a-zA-Z_]/.test(src[i])) {
      let s = ''; while (i < n && /[a-zA-Z0-9_]/.test(src[i])) s += src[i++];
      ts.push({t: KW.has(s) ? 'K' : 'I', v:s}); continue;
    }
    if (src.slice(i,i+3) === '...') { ts.push({t:'O',v:'...'}); i+=3; continue; }
    const two = src.slice(i,i+2);
    if (['==','~=','<=','>=','..','//','<<','>>'].includes(two)) { ts.push({t:'O',v:two}); i+=2; continue; }
    ts.push({t:'O',v:src[i++]});
  }
  ts.push({t:'E',v:'<eof>'}); return ts;
}

// ── Module 8: PARSER (Lua 5.1 + Luau subset) ───────────────────────────────
class Parser {
  constructor(ts) { this.ts = ts; this.pos = 0; }
  peek() { return this.ts[this.pos]; }
  next() { return this.ts[this.pos++]; }
  check(t, v) { const k = this.peek(); return k.t === t && (v == null || k.v === v); }
  eat(t, v) {
    const k = this.next();
    if (k.t !== t || (v != null && k.v !== v)) throw new Error('Parse error: expected ' + t + ':' + v + ' got ' + k.t + ':' + k.v);
    return k;
  }
  try_(t, v) { if (this.check(t, v)) { this.next(); return true; } return false; }

  parse() {
    const b = this.block();
    if (!this.check('E')) throw new Error('Unexpected token: ' + this.peek().v);
    return b;
  }

  block() {
    const ss = []; const END = new Set(['end','else','elseif','until']);
    while (!this.check('E') && !(this.check('K') && END.has(this.peek().v))) {
      const s = this.stat(); if (s) ss.push(s); this.try_('O', ';');
      if (s && s.type === 'ret') break;
    }
    return {type:'block',ss};
  }

  stat() {
    const k = this.peek();
    if (k.t === 'K') switch (k.v) {
      case 'local': return this.localStat();
      case 'if': return this.ifStat();
      case 'while': { this.next(); const c=this.expr(); this.eat('K','do'); const b=this.block(); this.eat('K','end'); return {type:'while',c,b}; }
      case 'do': { this.next(); const b=this.block(); this.eat('K','end'); return {type:'do',b}; }
      case 'for': return this.forStat();
      case 'repeat': { this.next(); const b=this.block(); this.eat('K','until'); const c=this.expr(); return {type:'repeat',b,c}; }
      case 'function': { this.next(); return this.funcStat(); }
      case 'return': {
        this.next(); const END2 = new Set(['end','else','elseif','until']);
        let vs = [];
        if (!this.check('E') && !(this.check('K') && END2.has(this.peek().v)) && !this.check('O',';'))
          vs = this.exprList();
        this.try_('O', ';'); return {type:'ret',vs};
      }
      case 'break': { this.next(); return {type:'break'}; }
      case 'goto': { this.next(); return {type:'goto',n:this.eat('I').v}; }
    }
    if (k.t === 'I' && this.ts[this.pos+1] && this.ts[this.pos+1].v === '::') {
      this.next(); this.next(); const nm = k.v; this.eat('O','::'); return {type:'label',n:nm};
    }
    return this.assignOrCall();
  }

  localStat() {
    this.eat('K','local');
    if (this.try_('K','function')) { const n=this.eat('I').v; const fn=this.funcbody(); return {type:'lf',n,fn}; }
    const ns = [this.eat('I').v];
    while (this.try_('O',',')) ns.push(this.eat('I').v);
    let vs = []; if (this.try_('O','=')) vs = this.exprList();
    return {type:'local',ns,vs};
  }

  ifStat() {
    this.eat('K','if'); const c=this.expr(); this.eat('K','then'); const th=this.block();
    const eis = []; let el = null;
    while (this.try_('K','elseif')) { const ec=this.expr(); this.eat('K','then'); const eb=this.block(); eis.push({c:ec,b:eb}); }
    if (this.try_('K','else')) el = this.block();
    this.eat('K','end'); return {type:'if',c,th,eis,el};
  }

  forStat() {
    this.eat('K','for'); const fn = this.eat('I').v;
    if (this.try_('O','=')) {
      const s=this.expr(); this.eat('O',','); const lim=this.expr();
      let step=null; if (this.try_('O',',')) step=this.expr();
      this.eat('K','do'); const b=this.block(); this.eat('K','end');
      return {type:'nfor',n:fn,s,lim,step,b};
    }
    const ns = [fn]; while (this.try_('O',',')) ns.push(this.eat('I').v);
    this.eat('K','in'); const its=this.exprList(); this.eat('K','do'); const b=this.block(); this.eat('K','end');
    return {type:'gfor',ns,its,b};
  }

  funcStat() {
    let nm = this.eat('I').v; let method = null;
    while (this.try_('O','.')) nm += '.' + this.eat('I').v;
    if (this.try_('O',':')) method = this.eat('I').v;
    const fn = this.funcbody(method ? ['self'] : null);
    return {type:'func_stat',n:nm,method,fn};
  }

  assignOrCall() {
    let e = this.suffixExpr();
    if (this.check('O','=') || this.check('O',',')) {
      const tgts = [e]; while (this.try_('O',',')) tgts.push(this.suffixExpr());
      this.eat('O','='); const vs=this.exprList(); return {type:'assign',tgts,vs};
    }
    if (e.type === 'call' || e.type === 'mcall') return {type:'callst',e};
    throw new Error("syntax error near '" + this.peek().v + "'");
  }

  suffixExpr() {
    let e = this.primaryExpr();
    while (true) {
      if (this.try_('O','.')) { e = {type:'field',obj:e,key:this.eat('I').v}; }
      else if (this.check('O','[')) { this.next(); const k=this.expr(); this.eat('O',']'); e={type:'index',obj:e,key:k}; }
      else if (this.try_('O',':')) { const m=this.eat('I').v; const as=this.callArgs(); e={type:'mcall',obj:e,method:m,args:as}; }
      else if (this.check('O','(') || this.check('O','{') || this.check('S')) { const as=this.callArgs(); e={type:'call',func:e,args:as}; }
      else break;
    }
    return e;
  }

  primaryExpr() {
    const k = this.peek();
    if (k.t === 'I') { this.next(); return {type:'var',name:k.v}; }
    if (k.t === 'O' && k.v === '(') { this.next(); const e=this.expr(); this.eat('O',')'); return {type:'paren',e}; }
    throw new Error("unexpected symbol near '" + k.v + "'");
  }

  callArgs() {
    if (this.try_('O','(')) { if (this.try_('O',')')) return []; const as=this.exprList(); this.eat('O',')'); return as; }
    if (this.check('S')) return [{type:'str',val:this.next().v}];
    if (this.check('O','{')) return [this.tblCtor()];
    throw new Error("function arguments expected");
  }

  tblCtor() {
    this.eat('O','{'); const items = [];
    if (!this.try_('O','}')) {
      do {
        if (this.check('O','[')) {
          this.next(); const k=this.expr(); this.eat('O',']'); this.eat('O','='); const v=this.expr(); items.push({k,v});
        } else if (this.check('I') && this.ts[this.pos+1] && this.ts[this.pos+1].v === '=') {
          const key=this.next().v; this.eat('O','='); const v=this.expr(); items.push({k:{type:'str',val:key},v});
        } else {
          items.push({v:this.expr()});
        }
      } while (this.try_('O',','));
      this.eat('O','}');
    }
    return {type:'tbl',items};
  }

  funcbody(ctx) {
    this.eat('O','(');
    const ps = ctx ? [...ctx] : [];
    if (!this.check('O',')')) {
      if (this.check('O','...')) { this.next(); this.eat('O',')'); }
      else {
        do { ps.push(this.eat('I').v); } while (this.try_(','));
        this.try_('O',',');
        if (this.check('O','...')) { this.next(); }
        this.eat('O',')');
      }
    } else { this.next(); }
    let d = null;
    if (this.try_('O',':')) d = this.eat('I').v;
    const b = this.block(); this.eat('K','end');
    return {ps,d,b};
  }

  expr() { return this.exprOr(); }

  exprOr() {
    let e = this.exprAnd();
    while (this.try_('K','or')) e = {type:'op',op:'or',a:e,b:this.exprAnd()};
    return e;
  }

  exprAnd() {
    let e = this.exprNot();
    while (this.try_('K','and')) e = {type:'op',op:'and',a:e,b:this.exprNot()};
    return e;
  }

  exprNot() {
    if (this.try_('K','not')) return {type:'op',op:'not',a:this.exprNot()};
    return this.exprComp();
  }

  exprComp() {
    let e = this.exprConcat();
    const ops = ['==','~=','<','>','<=','>='];
    while (this.check('O') && ops.includes(this.peek().v)) {
      const op = this.next().v; e = {type:'op',op,a:e,b:this.exprConcat()};
    }
    return e;
  }

  exprConcat() {
    let e = this.exprAdd();
    while (this.try_('O','..')) e = {type:'op',op:'..',a:e,b:this.exprAdd()};
    return e;
  }

  exprAdd() {
    let e = this.exprMul();
    while (this.check('O') && ['+','-'].includes(this.peek().v)) {
      const op = this.next().v; e = {type:'op',op,a:e,b:this.exprMul()};
    }
    return e;
  }

  exprMul() {
    let e = this.exprUnary();
    while (this.check('O') && ['*','/','//','%'].includes(this.peek().v)) {
      const op = this.next().v; e = {type:'op',op,a:e,b:this.exprUnary()};
    }
    return e;
  }

  exprUnary() {
    if (this.check('O') && ['-','#'].includes(this.peek().v)) {
      const op = this.next().v; return {type:'op',op,a:this.exprUnary()};
    }
    return this.exprPow();
  }

  exprPow() {
    let e = this.primaryExpr();
    if (this.try_('O','^')) return {type:'op',op:'^',a:e,b:this.exprUnary()};
    return e;
  }

  exprList() {
    const es = []; do { es.push(this.expr()); } while (this.try_(','));
    return es;
  }
}

// ── Module 9: AST TRANSFORMER ──────────────────────────────────────────────
class ASTTransformer {
  constructor(opts) {
    this.opts = opts;
    this.varMap = new Map();
    this.globalRefs = new Set();
    this.funcNames = new Set();
    this.stats = { vars: 0, funcs: 0, strings: 0, deadBlocks: 0 };
  }

  transform(ast) {
    this._collectInfo(ast);
    return this._transformBlock(ast);
  }

  _collectInfo(node) {
    if (!node || typeof node !== 'object') return;
    if (node.type === 'var' && !KW.has(node.name)) {
      if (!this.varMap.has(node.name)) {
        this.varMap.set(node.name, rname());
        this.stats.vars++;
      }
    }
    if (node.type === 'lf' || node.type === 'func_stat') {
      const nm = node.type === 'lf' ? node.n : node.n;
      this.funcNames.add(nm);
      this._collectInfo(node.fn?.b);
    }
    if (node.type === 'block') node.ss?.forEach(s => this._collectInfo(s));
    if (node.type === 'if') { this._collectInfo(node.c); this._collectInfo(node.th); node.eis?.forEach(e => { this._collectInfo(e.c); this._collectInfo(e.b); }); this._collectInfo(node.el); }
    if (node.type === 'while') { this._collectInfo(node.c); this._collectInfo(node.b); }
    if (node.type === 'for' || node.type === 'gfor') { this._collectInfo(node.b); }
    if (node.type === 'assign') { node.tgts?.forEach(t => this._collectInfo(t)); node.vs?.forEach(v => this._collectInfo(v)); }
    if (node.type === 'call' || node.type === 'mcall') { this._collectInfo(node.func); node.args?.forEach(a => this._collectInfo(a)); }
    if (node.type === 'op') { this._collectInfo(node.a); this._collectInfo(node.b); }
    if (node.type === 'tbl') node.items?.forEach(i => { this._collectInfo(i.k); this._collectInfo(i.v); });
  }

  _transformBlock(node) {
    if (node.type !== 'block') return node;
    const ss = [];
    for (const s of node.ss) {
      const ts = this._transformStat(s);
      if (Array.isArray(ts)) ss.push(...ts);
      else if (ts) ss.push(ts);
    }
    return {...node, ss};
  }

  _transformStat(node) {
    if (!node) return null;
    switch (node.type) {
      case 'local': {
        const ns = node.ns.map(n => {
          if (KW.has(n)) return n;
          this.varMap.set(n, rname()); return this.varMap.get(n);
        });
        const vs = node.vs?.map(v => this._transformExpr(v));
        if (node.fn) {
          const nm = this.varMap.get(node.n) || node.n;
          const fn = this._transformFunc(node.fn, nm);
          return {type:'lf',n:nm,fn};
        }
        return {type:'local',ns,vs};
      }
      case 'func_stat': {
        const fn = this._transformFunc(node.fn, node.n);
        return {type:'func_stat',n:node.n,method:node.method,fn};
      }
      case 'if': {
        const c = this._transformExpr(node.c);
        const th = this._transformBlock(node.th);
        const eis = node.eis?.map(e => ({c: this._transformExpr(e.c), b: this._transformBlock(e.b)}));
        const el = node.el ? this._transformBlock(node.el) : null;
        return {type:'if',c,th,eis,el};
      }
      case 'while': {
        const c = this._transformExpr(node.c);
        const b = this._transformBlock(node.b);
        return {type:'while',c,b};
      }
      case 'nfor': {
        const b = this._transformBlock(node.b);
        return {...node,b};
      }
      case 'gfor': {
        const b = this._transformBlock(node.b);
        return {...node,b};
      }
      case 'do': {
        const b = this._transformBlock(node.b);
        return {type:'do',b};
      }
      case 'repeat': {
        const b = this._transformBlock(node.b);
        const c = this._transformExpr(node.c);
        return {type:'repeat',b,c};
      }
      case 'assign': {
        const tgts = node.tgts?.map(t => this._transformExpr(t));
        const vs = node.vs?.map(v => this._transformExpr(v));
        return {type:'assign',tgts,vs};
      }
      case 'callst': {
        const e = this._transformExpr(node.e);
        return {type:'callst',e};
      }
      case 'ret': {
        const vs = node.vs?.map(v => this._transformExpr(v));
        return {type:'ret',vs};
      }
      case 'break': return node;
      case 'block': return this._transformBlock(node);
      default: return node;
    }
  }

  _transformFunc(fn, name) {
    const oldMap = new Map(this.varMap);
    const newParams = fn.ps.map(p => { const nr = rname(); this.varMap.set(p, nr); return nr; });
    const b = this._transformBlock(fn.b);
    this.varMap = oldMap;
    return {...fn, ps: newParams, b};
  }

  _transformExpr(node) {
    if (!node || typeof node !== 'object') return node;
    switch (node.type) {
      case 'var': {
        if (KW.has(node.name)) return node;
        const mapped = this.varMap.get(node.name);
        return mapped ? {...node, name: mapped} : node;
      }
      case 'str': {
        this.stats.strings++;
        if (this.opts.strenc) {
          const enc = encStr(node.val);
          return {type:'raw',code: enc};
        }
        return node;
      }
      case 'op': {
        const a = this._transformExpr(node.a);
        const b = this._transformExpr(node.b);
        return {...node,a,b};
      }
      case 'call': {
        const func = this._transformExpr(node.func);
        const args = node.args?.map(a => this._transformExpr(a));
        return {...node,func,args};
      }
      case 'mcall': {
        const obj = this._transformExpr(node.obj);
        const args = node.args?.map(a => this._transformExpr(a));
        return {...node,obj,args};
      }
      case 'field': {
        const obj = this._transformExpr(node.obj);
        return {...node,obj};
      }
      case 'index': {
        const obj = this._transformExpr(node.obj);
        const key = this._transformExpr(node.key);
        return {...node,obj,key};
      }
      case 'tbl': {
        const items = node.items?.map(i => ({
          k: i.k ? this._transformExpr(i.k) : null,
          v: this._transformExpr(i.v)
        }));
        return {...node,items};
      }
      case 'paren': {
        const e = this._transformExpr(node.e);
        return {...node,e};
      }
      case 'raw': return node;
      default: return node;
    }
  }
}

// ── Module 10: CODE GENERATOR ──────────────────────────────────────────────
class CodeGenerator {
  constructor(opts) {
    this.opts = opts;
    this.indent = 0;
    this.output = [];
  }

  generate(ast) {
    this.output = [];
    this._genBlock(ast);
    return this.output.join('');
  }

  _genBlock(node, needEnd = false) {
    if (node.type === 'block') {
      for (const s of node.ss) {
        if (s.type === 'ret') { this._genRet(s); this.output.push('\n'); continue; }
        this._genStat(s);
        if (s.type !== 'if' && s.type !== 'while' && s.type !== 'do' && s.type !== 'nfor' && s.type !== 'gfor' && s.type !== 'repeat')
          this.output.push('\n');
      }
      return;
    }
    this._genStat(node);
  }

  _genStat(node) {
    if (!node) return;
    const i = '  '.repeat(this.indent);
    switch (node.type) {
      case 'local': {
        const vs = node.vs?.map(v => this._genExpr(v)).join(', ') || '';
        this.output.push(i + 'local ' + node.ns.join(', ') + (vs ? ' = ' + vs : ''));
        break;
      }
      case 'lf': {
        this._genFuncDecl(node.n, node.fn);
        break;
      }
      case 'func_stat': {
        this.output.push(i + node.n + (node.method ? ':' + node.method : '') + this._genFuncSig(node.fn));
        this.indent++;
        this._genBlock(node.fn.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'if': {
        this.output.push(i + 'if ' + this._genExpr(node.c) + ' then\n');
        this.indent++;
        this._genBlock(node.th);
        this.indent--;
        node.eis?.forEach(e => {
          this.output.push('  '.repeat(this.indent) + 'elseif ' + this._genExpr(e.c) + ' then\n');
          this.indent++;
          this._genBlock(e.b);
          this.indent--;
        });
        if (node.el) {
          this.output.push('  '.repeat(this.indent) + 'else\n');
          this.indent++;
          this._genBlock(node.el);
          this.indent--;
        }
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'while': {
        this.output.push(i + 'while ' + this._genExpr(node.c) + ' do\n');
        this.indent++;
        this._genBlock(node.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'do': {
        this.output.push(i + 'do\n');
        this.indent++;
        this._genBlock(node.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'nfor': {
        const step = node.step ? this._genExpr(node.step) : '1';
        this.output.push(i + 'for ' + node.n + ' = ' + this._genExpr(node.s) + ', ' + this._genExpr(node.lim) + (step !== '1' ? ', ' + step : '') + ' do\n');
        this.indent++;
        this._genBlock(node.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'gfor': {
        this.output.push(i + 'for ' + node.ns.join(', ') + ' in ' + node.its.map(it => this._genExpr(it)).join(', ') + ' do\n');
        this.indent++;
        this._genBlock(node.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'end\n');
        break;
      }
      case 'repeat': {
        this.output.push(i + 'repeat\n');
        this.indent++;
        this._genBlock(node.b);
        this.indent--;
        this.output.push('  '.repeat(this.indent) + 'until ' + this._genExpr(node.c) + '\n');
        break;
      }
      case 'assign': {
        const tgts = node.tgts.map(t => this._genExpr(t)).join(', ');
        const vs = node.vs.map(v => this._genExpr(v)).join(', ');
        this.output.push(i + tgts + ' = ' + vs);
        break;
      }
      case 'callst': {
        this.output.push(i + this._genExpr(node.e));
        break;
      }
      case 'ret': {
        if (node.vs?.length) {
          this.output.push(i + 'return ' + node.vs.map(v => this._genExpr(v)).join(', '));
        } else {
          this.output.push(i + 'return');
        }
        break;
      }
      case 'break': {
        this.output.push(i + 'break');
        break;
      }
      case 'block': {
        this._genBlock(node);
        break;
      }
    }
  }

  _genRet(node) {
    const i = '  '.repeat(this.indent);
    if (node.vs?.length) {
      this.output.push(i + 'return ' + node.vs.map(v => this._genExpr(v)).join(', '));
    } else {
      this.output.push(i + 'return');
    }
  }

  _genFuncDecl(name, fn) {
    const i = '  '.repeat(this.indent);
    this.output.push(i + 'function ' + name + this._genFuncSig(fn));
    this.indent++;
    this._genBlock(fn.b);
    this.indent--;
    this.output.push('  '.repeat(this.indent) + 'end\n');
  }

  _genFuncSig(fn) {
    const ps = fn.ps.join(', ');
    return '(' + ps + ')' + (fn.d ? ':' + fn.d : '') + '\n';
  }

  _genExpr(node) {
    if (!node) return 'nil';
    switch (node.type) {
      case 'var': return node.name;
      case 'num': return String(node.val);
      case 'str': return JSON.stringify(node.val);
      case 'raw': return node.code;
      case 'bool': return String(node.val);
      case 'nil': return 'nil';
      case 'tbl': {
        const items = node.items?.map(i => {
          if (i.k) return '[' + this._genExpr(i.k) + '] = ' + this._genExpr(i.v);
          return this._genExpr(i.v);
        }).join(', ') || '';
        return '{' + items + '}';
      }
      case 'op': {
        if (node.op === 'not') return 'not ' + this._genExpr(node.a);
        if (node.op === '#') return '#' + this._genExpr(node.a);
        if (node.op === '-') return '-' + this._genExpr(node.a);
        const a = this._genExpr(node.a), b = this._genExpr(node.b);
        if (node.op === '..') return a + ' .. ' + b;
        return '(' + a + ' ' + node.op + ' ' + b + ')';
      }
      case 'call': {
        const args = node.args?.map(a => this._genExpr(a)).join(', ') || '';
        return this._genExpr(node.func) + '(' + args + ')';
      }
      case 'mcall': {
        const args = node.args?.map(a => this._genExpr(a)).join(', ') || '';
        return this._genExpr(node.obj) + ':' + node.method + '(' + args + ')';
      }
      case 'field': return this._genExpr(node.obj) + '.' + node.key;
      case 'index': return this._genExpr(node.obj) + '[' + this._genExpr(node.key) + ']';
      case 'paren': return '(' + this._genExpr(node.e) + ')';
      case 'vararg': return '...';
      default: return 'nil';
    }
  }
}

// ── Module 11: CONTROL FLOW FLATTENING ─────────────────────────────────────
function flattenControlFlow(code, opts) {
  if (!opts.cff) return code;
  const vG = rname(), vT = rname();
  const s1 = ri(0x20, 0x5F), s2 = ri(0x60, 0x9F), s3 = ri(0xA0, 0xDF);
  const fakeState = ri(0xE0, 0xFF);
  return (
    `local ${vG}=${N(s1)}\n` +
    `while true do\n` +
    `if ${vG}==${N(fakeState)} then\n` +
    `  local _=0\n` +
    `  break\n` +
    `elseif ${vG}==${N(s1)} then\n` +
    `  ${code}\n` +
    `  ${vG}=${N(s2)};continue\n` +
    `elseif ${vG}==${N(s2)} then\n` +
    `  break\n` +
    `end\n` +
    `end\n`
  );
}

// ── Module 12: DEAD CODE INJECTION ─────────────────────────────────────────
function injectDeadCode(opts) {
  if (!opts.dead) return '';
  const count = ri(2, 4);
  let code = '';
  for (let i = 0; i < count; i++) {
    const v = rname();
    const forms = [
      `if ${oF()} then local ${v}=${N(ri(1,0xFF))};${v}=nil end\n`,
      `do local ${v}=${N(ri(1,0xFFF))};if ${oF()} then ${v}=nil end end\n`,
      `while ${oF()} do break end\n`,
    ];
    code += '  ' + forms[ri(0, forms.length-1)];
  }
  return code;
}

// ── Module 13: FAKE OPCODE INJECTION ────────────────────────────────────────
function injectFakeOpcodes(opts) {
  if (!opts.fake) return '';
  const vB = rname(), vD = rname();
  const count = ri(20, 35);
  let code = `local ${vB}={}\n`;
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let fid; do { fid = ri(100, 200); } while (used.has(fid));
    used.add(fid);
    const families = [
      () => `if ${oF()} then return ${N(ri(0x1000,0x7FFF))} end`,
      () => `do local ${rname()}=${rbxN()};if ${oT()} then return end end`,
      () => `for ${rname()}=${N(1)},${N(ri(2,5))} do if ${oF()} then break end end`,
      () => `local ${rname()}=bit32.bxor(${N(ri(1,0xFF))},${N(ri(1,0xFF))})`,
    ];
    const body = families[ri(0, families.length-1)]();
    code += `${vB}[${N(fid)}]=function() ${body} end\n`;
  }
  return code;
}

// ── Module 14: JUNK UPVALUE CAPTURES ───────────────────────────────────────
function injectJunkUpvalues(opts) {
  if (!opts.junk) return '';
  const count = ri(3, 7);
  const upvals = [];
  for (let i = 0; i < count; i++) {
    upvals.push(rname());
  }
  const vEnv = rname();
  return (
    `(function(${upvals.join(',')})\n` +
    `  local ${vEnv}=getgenv or {}\n` +
    `end)(${upvals.map(u => 'nil').join(',')})\n`
  );
}

// ── Module 15: ANTI-DEBUG PROTECTION ───────────────────────────────────────
function buildAntiDebug(opts) {
  if (!opts.antidebug) return '';
  const v = rname();
  return (
    `local ${v}=function()\n` +
    `  if hookfunction then local _h=hookfunction(function()end,function()end)if type(_h)=="function"then error("")end end\n` +
    `  if syn and syn.protect_gui then pcall(syn.protect_gui,function()end)end\n` +
    `  if getgenv then local g=getgenv()if type(g)=="table"then for k,_ in pairs(g)do if string.find(tostring(k),"hook")then error("")end end end end\n` +
    `  if debug and debug.getinfo then pcall(function()local i=debug.getinfo(1)if not i then error("")end end)end\n` +
    `  if newcclosure then local n=newcclosure(function()end)if type(n)~="function"then error("")end end\n` +
    `end\n` +
    `pcall(${v})\n`
  );
}

// ── Module 16: ANTI-TAMPER (INTEGRITY CHECK) ─────────────────────────────────
function buildAntiTamper(opts) {
  if (!opts.antitamp) return '';
  const vH = rname(), vC = rname();
  const seed = ri(0x100000, 0xFFFFFF);
  return (
    `local ${vH}=function(${vC})\n` +
    `  local h=0\n` +
    `  for i=1,#${vC}do h=((h*${N(31)}+string.byte(${vC},i))%${N(0x7FFFFFFF)})end\n` +
    `  return h\n` +
    `end\n` +
    `local _chk=${vH}(string.sub(debug.getinfo and debug.getinfo(1,"S").source or "=x",2))\n` +
    `if math.abs(_chk-${N(seed)})>${N(100)}then error("integrity violation")end\n`
  );
}

// ── Module 17: VM ENGINE ───────────────────────────────────────────────────
function buildVMEngine(opts) {
  if (!opts.vm) return '';
  const vM = rname(), vO = rname(), vA = rname(), vB = rname(), vC = rname();
  const vT = rname();
  const mk = ri(10, 200);
  
  const opcodes = [
    {name:'ADD', body:`${vA}=(${vB}+${vC})`},
    {name:'SUB', body:`${vA}=(${vB}-${vC})`},
    {name:'MUL', body:`${vA}=(${vB}*${vC})`},
    {name:'DIV', body:`${vA}=(${vB}/${vC})`},
    {name:'MOD', body:`${vA}=(${vB}%${vC})`},
    {name:'POW', body:`${vA}=(${vB}^${vC})`},
    {name:'AND', body:`${vA}=bit32.band(${vB},${vC})`},
    {name:'OR', body:`${vA}=bit32.bor(${vB},${vC})`},
    {name:'XOR', body:`${vA}=bit32.bxor(${vB},${vC})`},
  ];

  const mm = {};
  opcodes.forEach((op, i) => { mm[op.name] = (i + mk) & 0xFF; });

  let lua = `local ${vM}\n${vM}=function(${vO},${vA},${vB},${vC})\n`;
  lua += `  local ${vT}={}\n`;
  opcodes.forEach(op => {
    lua += `  ${vT}[${N(mm[op.name])}]=function() ${op.body} end\n`;
  });
  lua += `  local _h=${vT}[${vO}]if _h then _h()end\nend\n`;

  if (opts.vmhide) {
    const wrapper = rname();
    return `(function()local ${wrapper}=${vM};${vM}=nil;return function(o,a,b,c)${wrapper}(o,a,b,c)end end)()`;
  }
  return lua;
}

// ── Module 18: VM SEALING (IIFE WRAPPER) ────────────────────────────────────
function buildVMSealing(vmCode) {
  const wrapper = rname();
  return (
    `(function()\n` +
    `  local ${wrapper}=function()\n` +
    vmCode.split('\n').map(l => '    ' + l).join('\n') + '\n' +
    `  end\n` +
    `  return ${wrapper}\n` +
    `end)()`
  );
}

// ── Module 19: ROBLOX API NOISE ─────────────────────────────────────────────
function buildRbxNoise(opts) {
  if (!opts.noise) return '';
  const count = ri(2, 4);
  let code = '';
  for (let i = 0; i < count; i++) {
    const v1 = rname(), v2 = rname();
    const api1 = rbxN(), api2 = rbxN();
    const forms = [
      `do local ${v1}=${api1};if ${oF()}then ${v2}=${api2}end;${v1}=nil end\n`,
      `if type(${api1})=="${ri(0,1)===0?'function':'table'}"then local ${v1}=${api2}end\n`,
      `local ${v1}=${api1}or ${api2};${v1}=nil\n`,
    ];
    code += '  ' + forms[ri(0, forms.length-1)];
  }
  return code;
}

// ── Module 20: MAIN PIPELINE ───────────────────────────────────────────────
function obfuscate(source, opts) {
  _usedNames.clear();
  _nameIdx = 0;
  _numStyle = ri(0, 4);
  _strVariant = ri(0, 3);
  _strSalt = ri(0, 5);

  // 1. Parse
  const tokens = lex(source);
  const parser = new Parser(tokens);
  const ast = parser.parse();

  // 2. Transform
  const transformer = new ASTTransformer(opts);
  const transformed = transformer.transform(ast);

  // 3. Generate
  const gen = new CodeGenerator(opts);
  let code = gen.generate(transformed);

  // 4. Minify
  if (opts.minify) {
    code = code.replace(/--[^\n]*/g, '').replace(/\n\s*\n/g, '\n');
  }

  // 5. Inject protections
  const parts = [];
  
  // VM Engine
  let vmCode = buildVMEngine(opts);
  if (vmCode && opts.vmhide) {
    parts.push(buildVMSealing(vmCode));
  } else if (vmCode) {
    parts.push(vmCode);
  }

  // Fake opcodes
  const fakeCode = injectFakeOpcodes(opts);
  if (fakeCode) parts.push(fakeCode);

  // Anti-debug
  const adCode = buildAntiDebug(opts);
  if (adCode) parts.push(adCode);

  // Anti-tamper
  const atCode = buildAntiTamper(opts);
  if (atCode) parts.push(atCode);

  // Junk upvalues
  const junkCode = injectJunkUpvalues(opts);
  if (junkCode) parts.push(junkCode);

  // Dead code
  const deadCode = injectDeadCode(opts);
  if (deadCode) parts.push(deadCode);

  // Roblox noise
  const noiseCode = buildRbxNoise(opts);
  if (noiseCode) parts.push(noiseCode);

  // Main code
  let mainCode = code;
  if (opts.cff) {
    mainCode = flattenControlFlow(code.trim(), opts);
  }

  parts.push(mainCode);

  // Combine all
  let finalCode = parts.join('\n');

  // VM sealing wrapper
  if (opts.vmhide) {
    const outerWrapper = rname();
    finalCode = `(function()\nlocal ${outerWrapper}=function()\n${finalCode.split('\n').map(l => '  ' + l).join('\n')}\nend\n${outerWrapper}()\nend)()`;
  }

  return {
    code: finalCode,
    stats: {
      originalLength: source.length,
      obfuscatedLength: finalCode.length,
      ratio: (finalCode.length / source.length).toFixed(1) + 'x',
      varsRenamed: transformer.stats.vars,
      stringsEncrypted: transformer.stats.strings,
    }
  };
}

// ── Module 21: PRESET CONFIGURATIONS ───────────────────────────────────────
const PRESETS = {
  light: {
    rename: true, dead: false, strenc: true, minify: false,
    cff: false, vm: false, antidebug: false, antitamp: false,
    vmhide: false, fake: false, junk: false, noise: true
  },
  medium: {
    rename: true, dead: true, strenc: true, minify: false,
    cff: true, vm: false, antidebug: true, antitamp: false,
    vmhide: false, fake: true, junk: false, noise: true
  },
  extreme: {
    rename: true, dead: true, strenc: true, minify: true,
    cff: true, vm: true, antidebug: true, antitamp: true,
    vmhide: true, fake: true, junk: true, noise: true
  }
};

function applyPreset(name) {
  const preset = PRESETS[name];
  Object.keys(preset).forEach(k => {
    const el = document.getElementById('f_' + k);
    if (el) el.checked = preset[k];
  });
  document.querySelectorAll('.pr').forEach(b => b.classList.remove('active'));
  document.querySelector(`.pr:${name === 'light' ? 'first' : name === 'medium' ? 'second' : 'last'}-child`)?.classList.add('active');
  document.querySelectorAll('.pr').forEach(b => {
    if (b.textContent.toLowerCase() === name) b.classList.add('active');
  });
}

function setPreset(name) {
  applyPreset(name);
}

function doCopy() {
  const out = document.getElementById('out');
  navigator.clipboard.writeText(out.value).then(() => {
    const btn = document.querySelector('.cb');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function showError(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
}

function showResult(result, stats) {
  document.getElementById('out').value = result;
  document.getElementById('rp').style.display = 'block';
  document.getElementById('err').style.display = 'none';

  const statsDiv = document.getElementById('stats');
  statsDiv.innerHTML = `
    <div class="stat"><div class="sv">${stats.ratio}</div><div class="sl2">Size Ratio</div></div>
    <div class="stat"><div class="sv">${stats.varsRenamed}</div><div class="sl2">Vars Renamed</div></div>
    <div class="stat"><div class="sv">${stats.stringsEncrypted}</div><div class="sl2">Strings Enc</div></div>
  `;

  const chipsDiv = document.getElementById('chips');
  const chips = [];
  const opts = getOpts();
  if (opts.rename) chips.push('Variables Renamed');
  if (opts.dead) chips.push('Dead Code');
  if (opts.strenc) chips.push('String Encryption');
  if (opts.cff) chips.push('Control Flow Flattening');
  if (opts.vm) chips.push('VM Engine');
  if (opts.antidebug) chips.push('Anti-Debug');
  if (opts.antitamp) chips.push('Integrity Check');
  if (opts.vmhide) chips.push('VM Sealing');
  if (opts.fake) chips.push('Fake Opcodes');
  if (opts.junk) chips.push('Junk Upvalues');
  if (opts.noise) chips.push('API Noise');
  chipsDiv.innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join('');
}

function getOpts() {
  return {
    rename: f('rename'),
    dead: f('dead'),
    strenc: f('strenc'),
    minify: f('minify'),
    cff: f('cff'),
    vm: f('vm'),
    antidebug: f('antidebug'),
    antitamp: f('antitamp'),
    vmhide: f('vmhide'),
    fake: f('fake'),
    junk: f('junk'),
    noise: f('noise'),
  };
}

async function go() {
  const btn = document.getElementById('obfBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  try {
    setProg(10);
    const source = document.getElementById('src').value.trim();
    if (!source) throw new Error('Please enter Lua code to protect');

    setProg(30);
    await new Promise(r => setTimeout(r, 50));

    setProg(60);
    const opts = getOpts();
    const result = obfuscate(source, opts);

    setProg(90);
    await new Promise(r => setTimeout(r, 50));

    showResult(result.code, result.stats);
    setProg(100);

    document.getElementById('ib').innerHTML = `
      <strong>Protection Complete</strong><br>
      Code is protected with enterprise-grade obfuscation. The output is fully executable Lua/Luau code.
    `;
  } catch (e) {
    showError('Error: ' + e.message);
    setProg(0);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Protect Code';
  }
}

// Initialize
setPreset('extreme');
